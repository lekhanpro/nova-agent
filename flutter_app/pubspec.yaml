name: nova_agent
description: Run AI Agent on Android with native superpowers — camera, GPS, SMS,
  notifications, and more. No root required.
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Storage / prefs
  shared_preferences: ^2.2.2

  # Permissions
  permission_handler: ^11.3.0

  # UI
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

  # HTTP (for log fetching)
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
