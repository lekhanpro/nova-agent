name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check shell scripts with shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh install.sh || true

      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json OK')"

      - name: Validate JS files parse
        run: |
          node --input-type=module < bin/autogptx.js 2>/dev/null || node -e "require('fs').readFileSync('bin/autogptx.js'); console.log('bin/autogptx.js OK')"
          echo "JS syntax OK"
